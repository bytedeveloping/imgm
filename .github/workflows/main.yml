name: Manual Multi-OS PyInstaller Build

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path to the Python file you want to build'
        required: true
        default: 'main.py'
        type: string
      upload_destination:
        description: 'Where should the finished binary go?'
        required: true
        default: 'actions-artifact'
        type: choice
        options:
          - 'actions-artifact'
          - 'commit-to-repo-folder'
      repo_folder_path:
        description: 'If committing to repo, type folder path (Do NOT use dist/)'
        required: false
        default: 'builds/'
        type: string

jobs:
  matrix-build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        include:
          - os: windows-latest
            suffix: '.exe'
            os_name: 'windows'
          - os: macos-latest
            suffix: '.app'
            os_name: 'macos'
          - os: ubuntu-latest
            suffix: '.bin'
            os_name: 'linux'

    timeout-minutes: 30 
    permissions:
      contents: write

    steps:
    - name: Check out source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Run PyInstaller on Selected File
      shell: bash
      run: |
        RAW_NAME=$(basename "${{ github.event.inputs.file_path }}" | cut -f 1 -d '.')
        
        # Build using --windowed for macOS to properly generate the .app bundle structure
        if [ "${{ matrix.os_name }}" = "macos" ]; then
          pyinstaller --onefile --windowed --name "${RAW_NAME}" "${{ github.event.inputs.file_path }}"
          # Zip the app bundle immediately so it preserves file symlinks and permissions
          cd dist
          zip -r "${RAW_NAME}${matrix.suffix}.zip" "${RAW_NAME}${matrix.suffix}"
          rm -rf "${RAW_NAME}${matrix.suffix}"
          cd ..
        else
          pyinstaller --onefile --name "${RAW_NAME}${{ matrix.suffix }}" "${{ github.event.inputs.file_path }}"
        fi

    # OPTION A: Standard GitHub Actions Upload (Temporary zip download)
    - name: Upload Finished Binary Artifact
      if: ${{ github.event.inputs.upload_destination == 'actions-artifact' }}
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.os_name }}
        path: dist/

    # OPTION B: Git Commit Directly Back Into The Repo Codebase
    - name: Commit Binary Directly to Repo Folder
      if: ${{ github.event.inputs.upload_destination == 'commit-to-repo-folder' }}
      shell: bash
      run: |
        TARGET_DIR="${{ github.event.inputs.repo_folder_path }}"
        
        # Sanity check: If the user typed dist/ or ./dist, stop them from self-destructing
        if [ "$TARGET_DIR" = "dist" ] || [ "$TARGET_DIR" = "dist/" ] || [ "$TARGET_DIR" = "./dist/" ]; then
          echo "Error: Target directory cannot be the temporary build directory (dist/)."
          exit 1
        fi
        
        mkdir -p "$TARGET_DIR"
        cp -R dist/* "$TARGET_DIR/"
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Pull updates first to prevent out-of-sync branch conflicts
        git pull origin ${{ github.ref_name }} --rebase
        
        git add "$TARGET_DIR"
        git commit -m "Automated PyInstaller build for ${{ matrix.os_name }} [skip ci]" || echo "No changes to commit"
        git push origin ${{ github.ref_name }}

