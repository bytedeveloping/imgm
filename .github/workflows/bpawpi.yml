name: Build Python app with PyInstaller

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path to the Python file you want to build'
        required: true
        default: 'main.py'
        type: string
      upload_destination:
        description: 'Where should the finished binary go?'
        required: true
        default: 'actions-artifact'
        type: choice
        options:
          - 'actions-artifact'
          - 'commit-to-repo-folder'
      repo_folder_path:
        description: 'If committing to repo, type folder path (Do NOT use dist/)'
        required: false
        default: 'builds/'
        type: string

jobs:
  matrix-build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        include:
          - os: windows-latest
            suffix: '.exe'
            os_name: 'windows'
          - os: macos-latest
            suffix: '.app'
            os_name: 'macos'
          - os: ubuntu-latest
            suffix: '.bin'
            os_name: 'linux'

    timeout-minutes: 30 
    permissions:
      contents: write

    steps:
    - name: Check out source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies & PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      shell: bash

    - name: Run PyInstaller on Selected File
      shell: bash
      run: |
        RAW_NAME=$(basename "${{ github.event.inputs.file_path }}" | cut -f 1 -d '.')
        SUFFIX="${{ matrix.suffix }}"
        
        if [ "${{ matrix.os_name }}" = "macos" ]; then
          # Build raw app bundle first
          pyinstaller --onefile --windowed --name "${RAW_NAME}" "${{ github.event.inputs.file_path }}"
          cd dist
          # Correctly zip the main.app folder into main.app.zip
          zip -r "${RAW_NAME}${SUFFIX}.zip" "${RAW_NAME}${SUFFIX}"
          # Remove original folder so only the compressed artifact remains in dist/
          rm -rf "${RAW_NAME}${SUFFIX}"
          cd ..
        else
          # Windows and Linux build smoothly with appended suffixes directly
          pyinstaller --onefile --name "${RAW_NAME}${SUFFIX}" "${{ github.event.inputs.file_path }}"
        fi

    # OPTION A: Standard GitHub Actions Upload (Temporary zip download)
    - name: Upload Finished Binary Artifact
      if: ${{ github.event.inputs.upload_destination == 'actions-artifact' }}
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ matrix.os_name }}
        path: dist/

    # OPTION B: Git Commit Directly Back Into The Repo Codebase
    - name: Commit Binary Directly to Repo Folder
      if: ${{ github.event.inputs.upload_destination == 'commit-to-repo-folder' }}
      shell: bash
      run: |
        TARGET_DIR="${{ github.event.inputs.repo_folder_path }}"
        
        if [ "$TARGET_DIR" = "dist" ] || [ "$TARGET_DIR" = "dist/" ] || [ "$TARGET_DIR" = "./dist/" ]; then
          echo "Error: Target directory cannot be the temporary build directory (dist/)."
          exit 1
        fi
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Create folder and stage files locally
        mkdir -p "$TARGET_DIR"
        cp -R dist/* "$TARGET_DIR/"
        git add "$TARGET_DIR"
        
        # Commit the changes locally
        git commit -m "Automated PyInstaller build for ${{ matrix.os_name }} [skip ci]" || echo "No changes to commit"
        
        # Concurrency Protection: Try pushing up to 5 times if another OS beats us to it
        for i in {1..5}; do
          echo "Attempting to push changes (Try $i of 5)..."
          
          # Pull down whatever the other OS just pushed, placing our commit cleanly on top
          git pull origin ${{ github.ref_name }} --rebase
          
          # Try to push to GitHub
          if git push origin ${{ github.ref_name }}; then
            echo "Push successful!"
            exit 0
          fi
          
          echo "Push rejected because another job updated the repo first. Retrying in 5 seconds..."
          sleep 5
        done
        
        echo "Failed to push changes after 5 attempts due to high concurrent race conditions."
        exit 1

