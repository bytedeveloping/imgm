name: Build Executables with PyInstaller

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: imgm-windows
            raw_output: dist/imgm.exe
            final_output: dist/imgm.exe
          - os: ubuntu-latest
            artifact_name: imgm-linux
            raw_output: dist/imgm
            final_output: dist/imgm.elf
          - os: macos-latest
            artifact_name: imgm-macos
            raw_output: dist/imgm
            final_output: dist/imgm

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # If your tkinter app uses external libraries (like Pillow for images), install them here:
        # pip install Pillow

    - name: Build with PyInstaller
      # We do NOT use --windowed / -w here, so that CLI mode stays active
      run: |
        pyinstaller --onefile imgm.py

    - name: Rename Extension for Linux
      if: matrix.os == 'ubuntu-latest'
      run: mv ${{ matrix.raw_output }} ${{ matrix.final_output }}

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.final_output }}
        retention-days: 5
