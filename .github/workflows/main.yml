name: Build Executables with PyInstaller

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggers

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: my_app-windows.exe
            asset_path: dist/my_app.exe
          - os: ubuntu-latest
            artifact_name: my_app-linux
            asset_path: dist/my_app
          - os: macos-latest
            artifact_name: my_app-macos
            asset_path: dist/my_app

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Caches dependencies to make builds faster

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # If you use a requirements file, uncomment the line below:
        # pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile imgm.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.asset_path }}
        retention-days: 5
